<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock AI V1.5 Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Stock AI V1.5 Pro</p>
      <h1>职业交易员思维股票分析助手</h1>
      <p class="subtitle">按“位置 → 趋势 → 成交量 → 支撑压力 → 风险 → 交易计划”的决策树分析，不盲目喊买卖。</p>
    </div>
  </header>

  <main class="layout">
    <section class="card input-card">
      <h2>输入股票信息</h2>
      <div class="grid two">
        <label>股票名称
          <input id="stockName" placeholder="例如：贵州茅台 / Tesla" />
        </label>
        <label>股票代码
          <input id="stockCode" placeholder="例如：600519 / TSLA" />
        </label>
      </div>

      <h3>价格与均线</h3>
      <div class="grid three">
        <label>当前价格
          <input id="price" type="number" step="0.01" placeholder="25.00" />
        </label>
        <label>MA20
          <input id="ma20" type="number" step="0.01" placeholder="23.75" />
        </label>
        <label>MA60
          <input id="ma60" type="number" step="0.01" placeholder="22.30" />
        </label>
      </div>

      <h3>历史位置</h3>
      <div class="grid two">
        <label>历史高点 / 近期重要高点
          <input id="high" type="number" step="0.01" placeholder="30.00" />
        </label>
        <label>历史低点 / 近期重要低点
          <input id="low" type="number" step="0.01" placeholder="18.00" />
        </label>
      </div>

      <h3>趋势与量能</h3>
      <div class="grid two">
        <label>趋势状态
          <select id="trend">
            <option value="up">上升趋势</option>
            <option value="sideways">箱体震荡</option>
            <option value="down">下降趋势</option>
            <option value="unknown">不确定</option>
          </select>
        </label>
        <label>成交量状态
          <select id="volume">
            <option value="normal">正常</option>
            <option value="breakout">放量突破</option>
            <option value="stagnation">放量滞涨</option>
            <option value="shrinkPullback">缩量回调</option>
            <option value="divergence">量价背离</option>
          </select>
        </label>
      </div>

      <h3>交易意图</h3>
      <div class="grid two">
        <label>你的状态
          <select id="positionState">
            <option value="watching">还没买，正在观察</option>
            <option value="holdingProfit">已持有，有盈利</option>
            <option value="holdingLoss">已持有，正在亏损</option>
          </select>
        </label>
        <label>操作风格
          <select id="style">
            <option value="steady">稳健</option>
            <option value="balanced">均衡</option>
            <option value="aggressive">激进</option>
          </select>
        </label>
      </div>

      <button id="analyzeBtn">开始专业分析</button>
      <p class="note">提示：V1.5 先做格式验证和专业分析框架；真实联网查股票数据适合 V2.0 以后升级。</p>
    </section>

    <section class="card result-card">
      <div class="result-header">
        <h2>分析结果</h2>
        <span id="riskBadge" class="badge neutral">等待分析</span>
      </div>
      <div id="output" class="output empty">输入数据后点击“开始专业分析”。</div>
    </section>

    <section class="card education-card">
      <h2>交易案例学习库</h2>
      <div id="caseLibrary" class="case-list"></div>
    </section>
  </main>

  <footer>
    <p>Stock AI V1.5 Pro · 教学与辅助分析工具，不构成投资建议。</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
