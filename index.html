<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stock AI V1.3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="shell">
  <section class="hero">
    <div>
      <p class="eyebrow">Stock AI · V1.3</p>
      <h1>小马哥股票分析系统</h1>
      <p class="desc">UI升级 + 你的选股体系产品化：大位置、MA5/10/20/60多头排列、成交量、风险评分。</p>
    </div>
    <div class="heroCard">
      <span>当前策略</span>
      <strong>低位 + 多头排列</strong>
      <small>先看大位置，再看均线共振</small>
    </div>
  </section>

  <section class="layout">
    <aside class="panel sticky">
      <h2>股票验证</h2>
      <label>股票代码<input id="code" placeholder="例如 920211"></label>
      <label>股票名称<input id="name" placeholder="例如 新睿电子"></label>
      <button id="checkBtn" class="secondary">验证并自动填充</button>
      <div id="verifyBox" class="notice">等待验证...</div>

      <h2 class="mt">价格区间</h2>
      <label>当前价格<input id="price" type="number" step="0.01"></label>
      <label>历史最高价<input id="high" type="number" step="0.01"></label>
      <label>历史最低价<input id="low" type="number" step="0.01"></label>
    </aside>

    <section class="content">
      <div class="cards">
        <div class="metric"><span>综合评分</span><b id="score">--</b><em id="scoreText">等待分析</em></div>
        <div class="metric"><span>大位置</span><b id="bigPos">--</b><em id="bigHint">历史区间</em></div>
        <div class="metric"><span>均线排列</span><b id="maRank">--</b><em id="maHint">MA5/10/20/60</em></div>
        <div class="metric"><span>风险等级</span><b id="risk">--</b><em id="riskHint">等待分析</em></div>
      </div>

      <div class="panel">
        <h2>均线系统</h2>
        <div class="formGrid">
          <label>MA5<input id="ma5" type="number" step="0.01"></label>
          <label>MA10<input id="ma10" type="number" step="0.01"></label>
          <label>MA20<input id="ma20" type="number" step="0.01"></label>
          <label>MA60<input id="ma60" type="number" step="0.01"></label>
        </div>
        <div class="rankLine" id="rankLine">等待输入 MA5、MA10、MA20、MA60</div>
      </div>

      <div class="panel">
        <h2>成交量与持仓</h2>
        <div class="formGrid">
          <label>当前成交量<input id="vol" type="number" step="1" placeholder="可选"></label>
          <label>平均成交量<input id="avgVol" type="number" step="1" placeholder="可选"></label>
          <label>买入价<input id="buy" type="number" step="0.01" placeholder="可选"></label>
          <label>股数<input id="qty" type="number" step="1" placeholder="可选"></label>
        </div>
        <div class="actions">
          <button id="analyzeBtn">开始 V1.3 分析</button>
          <button id="resetBtn" class="secondary">清空</button>
        </div>
      </div>

      <div class="panel report">
        <h2>AI 分析报告</h2>
        <pre id="report">等待分析...</pre>
      </div>
    </section>
  </section>

  <footer>V1.3 是半自动版：自动验证、自动判断均线排列、自动评分。真实联网行情接口放到 V1.4。</footer>
</main>
<script src="script.js"></script>
</body>
</html>
