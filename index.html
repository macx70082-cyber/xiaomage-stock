<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock AI V1.5 Ultimate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Stock AI V1.5 Ultimate</p>
      <h1>职业交易员式股票分析助手</h1>
      <p class="subtitle">不联网，先把分析大脑做到成熟：大位置/小位置、多空评分、风险拆解、交易计划、案例教学。</p>
    </div>
    <div class="badge">Ultimate</div>
  </header>

  <main class="layout">
    <section class="panel input-panel">
      <h2>输入股票信息</h2>
      <div class="grid two">
        <label>股票名称<input id="stockName" placeholder="例如：贵州茅台 / Tesla"></label>
        <label>股票代码<input id="stockCode" placeholder="例如：600519 / TSLA"></label>
      </div>

      <h3>价格与均线</h3>
      <div class="grid three">
        <label>当前价格<input id="price" type="number" step="0.01" placeholder="25.00"></label>
        <label>MA20<input id="ma20" type="number" step="0.01" placeholder="23.75"></label>
        <label>MA60<input id="ma60" type="number" step="0.01" placeholder="22.30"></label>
      </div>

      <h3>历史位置</h3>
      <div class="grid two">
        <label>历史高点 / 重要高点<input id="high" type="number" step="0.01" placeholder="30.00"></label>
        <label>历史低点 / 重要低点<input id="low" type="number" step="0.01" placeholder="18.00"></label>
      </div>

      <h3>趋势与量能</h3>
      <div class="grid two">
        <label>趋势状态
          <select id="trend">
            <option value="up">上涨趋势</option>
            <option value="side">震荡趋势</option>
            <option value="down">下跌趋势</option>
          </select>
        </label>
        <label>成交量状态
          <select id="volume">
            <option value="normal">正常</option>
            <option value="strong">放量</option>
            <option value="weak">缩量</option>
            <option value="divergence">放量滞涨</option>
          </select>
        </label>
      </div>

      <h3>交易意图</h3>
      <div class="grid two">
        <label>你的状态
          <select id="positionState">
            <option value="watch">还没买，正在观察</option>
            <option value="hold">已经持有</option>
            <option value="wantBuy">很想买</option>
            <option value="wantSell">想卖出</option>
          </select>
        </label>
        <label>操作风格
          <select id="style">
            <option value="steady">稳健</option>
            <option value="balanced">平衡</option>
            <option value="aggressive">激进</option>
          </select>
        </label>
      </div>

      <button id="analyzeBtn">开始 Ultimate 分析</button>
      <p class="notice">提示：V1.5 Ultimate 仍是学习和辅助分析工具，不构成投资建议。真实联网行情留给 V2.0。</p>
    </section>

    <section class="panel result-panel">
      <h2>职业交易员分析报告</h2>
      <div id="summaryCards" class="cards"></div>
      <div id="report" class="report empty">等待分析。输入数据后点击“开始 Ultimate 分析”。</div>
    </section>
  </main>

  <section class="panel library">
    <h2>交易案例学习库</h2>
    <div id="caseLibrary" class="case-grid"></div>
  </section>

  <script src="validation.js"></script>
  <script src="analysis.js"></script>
  <script src="risk.js"></script>
  <script src="strategy.js"></script>
  <script src="education.js"></script>
  <script src="main.js"></script>
</body>
</html>
