<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock AI V1.2.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
<header class="hero">
<p class="tag">Stock AI · V1.2.1</p>
<h1>📈 小马哥股票分析助手</h1>
<p class="sub">新增 A股代码校验：先判断股票代码格式和市场类型，再进行分析。</p>
</header>

<section class="grid">
<div class="card">
<h2>股票信息</h2>
<label>股票名称<input id="name" placeholder="例如：贵州茅台"></label>
<label>股票代码<input id="code" placeholder="例如：600519 / 000001 / 300750 / 688981"></label>
<button id="checkBtn" class="ghost">验证股票代码</button>
<div id="checkResult" class="checkBox">等待验证...</div>
</div>

<div class="card">
<h2>价格信息</h2>
<label>当前价格<input id="price" type="number" step="0.01"></label>
<label>MA20<input id="ma20" type="number" step="0.01"></label>
<label>MA30<input id="ma30" type="number" step="0.01"></label>
<label>MA60<input id="ma60" type="number" step="0.01"></label>
<label>历史最高价<input id="high" type="number" step="0.01"></label>
<label>历史最低价<input id="low" type="number" step="0.01"></label>
</div>

<div class="card">
<h2>持仓信息</h2>
<label>买入价<input id="buy" type="number" step="0.01"></label>
<label>股数<input id="qty" type="number" step="1"></label>
<button id="analyzeBtn">开始分析</button>
<button id="resetBtn" class="ghost">清空数据</button>
</div>
</section>

<section class="resultPanel">
<div class="scoreCard">
<p>综合评分</p>
<strong id="score">--</strong>
<span id="scoreText">等待分析</span>
</div>

<div class="miniGrid">
<div class="mini"><span>股票校验</span><b id="realStatus">--</b></div>
<div class="mini"><span>大位置</span><b id="bigPos">--</b></div>
<div class="mini"><span>小位置</span><b id="smallPos">--</b></div>
<div class="mini"><span>风险</span><b id="risk">--</b></div>
</div>

<div class="card">
<h2>🤖 AI 综合分析</h2>
<pre id="result">等待分析...</pre>
</div>
</section>

<footer>提示：V1.2.1 是基础代码校验，不等于联网确认股票真实存在；联网行情接口将在 V1.2.3 继续开发。</footer>
</main>
<script src="script.js"></script>
</body>
</html>
