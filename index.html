<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Stock AI V1.5 Pro Final</title><link rel="stylesheet" href="style.css"></head><body><header class="hero"><div><p class="eyebrow">Stock AI V1.5 Pro Final</p><h1>职业交易员思维股票分析助手</h1><p>按照「位置 → 趋势 → 量能 → 支撑压力 → 多空理由 → 风险等级 → 交易计划」输出完整报告。</p></div><div class="hero-card"><b>V1.5 最终版</b><span>更专业 · 更清晰 · 更适合学习</span></div></header><main class="layout"><section class="panel"><h2>① 输入股票信息</h2><div class="grid two"><label>股票名称<input id="stockName" placeholder="例如：贵州茅台 / Tesla"></label><label>股票代码<input id="stockCode" placeholder="例如：600519 / TSLA"></label></div><h3>② 价格与均线</h3><div class="grid three"><label>当前价格<input id="price" type="number" step="0.01" placeholder="25.00"></label><label>MA20<input id="ma20" type="number" step="0.01" placeholder="23.75"></label><label>MA60<input id="ma60" type="number" step="0.01" placeholder="22.30"></label></div><h3>③ 历史位置</h3><div class="grid two"><label>历史高点 / 重要压力<input id="high" type="number" step="0.01" placeholder="30.00"></label><label>历史低点 / 重要支撑<input id="low" type="number" step="0.01" placeholder="18.00"></label></div><h3>④ 趋势与量能</h3><div class="grid two"><label>趋势状态<select id="trend"><option value="up">上升趋势</option><option value="sideways">箱体震荡</option><option value="down">下降趋势</option><option value="unknown">不确定</option></select></label><label>成交量状态<select id="volume"><option value="normal">正常</option><option value="breakout">放量突破</option><option value="stagnation">放量滞涨</option><option value="shrinkPullback">缩量回调</option><option value="divergence">量价背离</option></select></label></div><h3>⑤ 交易意图</h3><div class="grid two"><label>你的状态<select id="positionState"><option value="watching">还没买，正在观察</option><option value="holdingProfit">已持有，有盈利</option><option value="holdingLoss">已持有，正在亏损</option></select></label><label>操作风格<select id="style"><option value="steady">稳健</option><option value="balanced">均衡</option><option value="aggressive">激进</option></select></label></div><div class="actions"><button id="analyzeBtn">生成专业分析报告</button><button id="demoBtn" class="ghost">填入示例</button><button id="clearBtn" class="ghost">清空</button></div><p class="tip">V1.5 Final 不联网，不保证股票真实存在；联网行情查询适合 V2.0 升级。</p></section><section class="panel result"><div class="result-head"><h2>专业分析报告</h2><span id="riskBadge" class="badge">等待分析</span></div><div id="output" class="output empty">输入数据后，点击“生成专业分析报告”。</div></section><section class="panel wide"><h2>交易案例学习库</h2><div id="caseLibrary" class="cases"></div></section></main><footer>Stock AI V1.5 Pro Final · 学习与辅助分析工具，不构成投资建议。</footer><script type="module" src="main.js"></script></body></html>
